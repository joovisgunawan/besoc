services:
  student-service:
    build: .
    ports:
      - "8080:8080"
    environment:
      # DATABASE_URL: postgres://postgres:password@postgres:5432/student_service
      # DATABASE_PRIMARY_URL: postgres://postgres:password@postgres:5432/student_service
      # DATABASE_REPLICA_URL: postgres://postgres:password@postgres:5432/student_service
      DATABASE_URL: postgres://postgres:password@postgres-primary:5432/student_service
      DATABASE_PRIMARY_URL: postgres://postgres:password@postgres-primary:5432/student_service
      DATABASE_REPLICA_URL: postgres://postgres:password@postgres-replica:5432/student_service
      REDIS_URL: redis://redis:6379
      KAFKA_BROKER: kafka:9092
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    networks:
      - default
      - db_network
      - kafka_network
      - elk_network
      - jaeger_network
    restart: unless-stopped

  filebeat:
    image: elastic/filebeat:8.12.0
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - elk_network
    restart: unless-stopped

networks:
  db_network:
    external: true
    name: db_network
  kafka_network:
    external: true
    name: kafka_network
  elk_network:
    external: true
    name: elk_network
  jaeger_network:
    external: true
    name: jaeger_network