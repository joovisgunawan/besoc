input {
  beats {
    port => 5044
  }
}

filter {
  if [container][name] =~ "student-service" {
    json {
      source => "message"
    }

    # rename tracing fields to ELK conventions
    mutate {
      rename => {
        "span.id"    => "trace.span_id"
        "trace.id"   => "trace.trace_id"
        "level"      => "log.level"
        "target"     => "log.logger"
      }
      add_field => {
        "service.name" => "student-service"
      }
    }

    # parse timestamp
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # tag errors
    if [log.level] == "ERROR" {
      mutate { add_tag => ["error"] }
    }

    if [log.level] == "WARN" {
      mutate { add_tag => ["warning"] }
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "student-service-%{+YYYY.MM.dd}"
  }
}