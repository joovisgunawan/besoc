services:
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "16686:16686" # Jaeger UI
      - "14268:14268" # Jaeger HTTP collector
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    volumes:
      - jaeger_data:/badger
    networks:
      - jaeger_network
      - backend_network
    restart: unless-stopped

networks:
  jaeger_network:
    name: jaeger_network

  backend_network:
    external: true

volumes:
  jaeger_data: